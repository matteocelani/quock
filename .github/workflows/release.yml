name: Release

# When a new version lands on main (a release/* or hotfix/* PR merged), tag it and
# publish a GitHub Release with notes auto-generated from the merged PRs. No manual
# tag, no hand-written changelog. Idempotent: skips if the tag already exists.
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: ver
        run: echo "v=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - id: exists
        run: |
          if git rev-parse "v${{ steps.ver.outputs.v }}" >/dev/null 2>&1; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.exists.outputs.found == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v${{ steps.ver.outputs.v }}"
          git tag "$tag"
          git push origin "$tag"
          gh release create "$tag" --title "$tag" --generate-notes
